<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: #020617;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      opacity: 0.8;
    }

    nav a:hover {
      opacity: 1;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
      opacity: 0.7;
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 24px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: #020617;
      padding: 20px;
      border-radius: 12px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<header>
  <h1>MyBrand</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Features</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Modern Web Experience</h2>
  <p>Fast, clean, and simple design like ERLCX</p>
  <a href="#" class="btn">Get Started</a>
</section>

<section class="section">
  <h2>Features</h2>
  <div class="cards">
    <div class="card">
      <h3>Fast</h3>
      <p>Optimised for speed</p>
    </div>
    <div class="card">
      <h3>Modern</h3>
      <p>Clean and stylish UI</p>
    </div>
    <div class="card">
      <h3>Responsive</h3>
      <p>Works on all devices</p>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 MyBrand</p>
</footer>

</body>
</html>

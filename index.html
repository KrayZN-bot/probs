<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KrayTesting</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0a0a0a;
color:white;
height:100vh;
overflow:hidden;
}

/* HEADER */

header{
width:100%;
height:90px;
background:#111;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
border-bottom:1px solid #1f1f1f;
}

.logo{
width:60px;
height:60px;
background:#222;
border-radius:10px;
}

.title{
font-size:28px;
font-weight:600;
letter-spacing:1px;
}

/* MAIN LAYOUT */

.main{
display:flex;
height:calc(100vh - 90px);
}

/* LEFT PANEL */

.panel{
width:420px;
background:#0f0f0f;
border-right:1px solid #1a1a1a;
padding:30px;
}

.panel h2{
margin-bottom:20px;
}

.inputBox{
margin-bottom:20px;
}

.inputBox input{
width:100%;
padding:12px;
background:#161616;
border:none;
color:white;
border-radius:8px;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:#5865F2;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#4752c4;
}

/* PREVIEW AREA */

.viewer{
flex:1;
display:flex;
align-items:center;
justify-content:center;
background:#080808;
}

.avatarPreview{
width:700px;
height:700px;
background:#111;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:#555;
}

/* FOOTER */

footer{
position:absolute;
bottom:10px;
left:20px;
color:#555;
font-size:13px;
}

</style>
</head>

<body>

<header>

<div style="display:flex;align-items:center;gap:15px">
<div class="logo"></div>
<div class="title">KrayTesting</div>
</div>

</header>

<div class="main">

<div class="panel">

<h2>Clothing Preview</h2>

<div class="inputBox">
<input id="shirtID" placeholder="Enter Shirt Asset ID">
</div>

<div class="inputBox">
<input id="pantsID" placeholder="Enter Pants Asset ID">
</div>

<button onclick="preview()">Preview Clothing</button>

</div>

<div class="viewer">

<div class="avatarPreview" id="previewBox">
Avatar Preview
</div>

</div>

</div>

<footer>
KrayTesting © 2026
</footer>

<script>

function preview(){

let shirt = document.getElementById("shirtID").value
let pants = document.getElementById("pantsID").value

let previewBox = document.getElementById("previewBox")

previewBox.innerHTML = `
<div style="text-align:center">
<p>Preview Loaded</p>
<p style="font-size:14px;color:#888">Shirt ID: ${shirt}</p>
<p style="font-size:14px;color:#888">Pants ID: ${pants}</p>
</div>
`

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveryHub (Full Version)</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 text-white min-h-screen">

<nav class="bg-gray-900 p-4 flex justify-between items-center">
  <h1 class="text-2xl font-bold">🚓 LiveryHub</h1>
  <div id="navUser"></div>
</nav>

<section class="text-center py-12">
  <h2 class="text-4xl font-bold">Community Liveries</h2>
  <p class="text-gray-400">Upload and explore liveries from everyone</p>
</section>

<div class="text-center mb-6">
  <button onclick="openUpload()" class="bg-green-500 px-4 py-2 rounded-xl">Upload</button>
</div>

<section id="grid" class="p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></section>

<!-- Upload Modal -->
<div id="uploadModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
  <div class="bg-gray-800 p-6 rounded-xl w-80">
    <h2 class="mb-3">Upload Livery</h2>
    <input id="title" placeholder="Title" class="input">
    <input id="image" placeholder="Image URL" class="input">
    <select id="category" class="input">
      <option>Police</option>
      <option>Fire</option>
      <option>EMS</option>
      <option>Civilian</option>
    </select>
    <button onclick="upload()" class="bg-green-500 w-full p-2 rounded">Upload</button>
  </div>
</div>

<style>
.input{width:100%;padding:10px;margin-bottom:10px;border-radius:10px;background:#374151}
</style>

<script>
// 🔥 REPLACE THIS WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCsqZ0h74iJRGWlDoCrIVmoXV2aprD_WYo",
  authDomain: "vercel-8c369.firebaseapp.com",
  projectId: "vercel-8c369",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Auth state
let currentUser = null;

auth.onAuthStateChanged(user => {
  currentUser = user;
  updateNav();
  loadLiveries();
});

function updateNav(){
  const nav = document.getElementById('navUser');
  if(currentUser){
    nav.innerHTML = `
      <span>${currentUser.email}</span>
      <button onclick="logout()" class="ml-2 bg-red-500 px-2 py-1 rounded">Logout</button>
    `;
  } else {
    nav.innerHTML = `
      <button onclick="login()" class="bg-blue-500 px-3 py-1 rounded">Login</button>
    `;
  }
}

function login(){
  const email = prompt('Email');
  const pass = prompt('Password');

  auth.signInWithEmailAndPassword(email, pass)
  .catch(()=>{
    auth.createUserWithEmailAndPassword(email, pass);
  });
}

function logout(){ auth.signOut(); }

function openUpload(){
  if(!currentUser) return alert('Login first');
  document.getElementById('uploadModal').classList.remove('hidden');
}

function upload(){
  const title = document.getElementById('title').value;
  const image = document.getElementById('image').value;
  const category = document.getElementById('category').value;

  db.collection('liveries').add({
    title,
    image,
    category,
    author: currentUser.email,
    created: Date.now()
  });

  document.getElementById('uploadModal').classList.add('hidden');
}

function loadLiveries(){
  db.collection('liveries').orderBy('created','desc')
  .onSnapshot(snapshot=>{
    const grid = document.getElementById('grid');
    grid.innerHTML='';

    snapshot.forEach(doc=>{
      const l = doc.data();
      grid.innerHTML += `
        <div class="bg-gray-800 rounded-xl overflow-hidden shadow hover:scale-105 transition">
          <img src="${l.image}" class="w-full h-48 object-cover">
          <div class="p-3">
            <h3 class="font-bold">${l.title}</h3>
            <p class="text-sm text-gray-400">${l.category}</p>
            <p class="text-xs text-gray-500">${l.author}</p>
          </div>
        </div>
      `;
    });
  });
}
</script>

</body>
</html>

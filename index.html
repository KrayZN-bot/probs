<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveryHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

  <!-- Navbar -->
  <nav class="bg-gray-800 p-4 flex justify-between items-center shadow-lg">
    <h1 class="text-2xl font-bold">🚓 LiveryHub</h1>
    <div>
      <button onclick="showRegister()" class="bg-blue-500 px-4 py-2 rounded-xl mr-2">Register</button>
      <button onclick="showUpload()" class="bg-green-500 px-4 py-2 rounded-xl">Upload</button>
    </div>
  </nav>

  <!-- Hero -->
  <section class="text-center py-12">
    <h2 class="text-4xl font-bold mb-4">Share & Download ERLC Liveries</h2>
    <p class="text-gray-400">Upload your designs, link your Roblox, and explore thousands of free liveries.</p>
  </section>

  <!-- Categories -->
  <section class="px-6">
    <h3 class="text-2xl mb-4">Categories</h3>
    <div class="flex gap-4 flex-wrap">
      <button onclick="filterCategory('All')" class="bg-gray-700 px-4 py-2 rounded-xl">All</button>
      <button onclick="filterCategory('Police')" class="bg-blue-600 px-4 py-2 rounded-xl">Police</button>
      <button onclick="filterCategory('Fire')" class="bg-red-600 px-4 py-2 rounded-xl">Fire</button>
      <button onclick="filterCategory('EMS')" class="bg-green-600 px-4 py-2 rounded-xl">EMS</button>
      <button onclick="filterCategory('Civilian')" class="bg-yellow-600 px-4 py-2 rounded-xl">Civilian</button>
    </div>
  </section>

  <!-- Livery Grid -->
  <section class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6" id="liveryGrid"></section>

  <!-- Register Modal -->
  <div id="registerModal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center">
    <div class="bg-gray-800 p-6 rounded-2xl w-80">
      <h2 class="text-xl mb-4">Create Account</h2>
      <input id="username" placeholder="Username" class="w-full p-2 mb-3 rounded bg-gray-700">
      <input id="roblox" placeholder="Roblox Username" class="w-full p-2 mb-3 rounded bg-gray-700">
      <button onclick="register()" class="bg-blue-500 w-full py-2 rounded-xl">Register</button>
    </div>
  </div>

  <!-- Upload Modal -->
  <div id="uploadModal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center">
    <div class="bg-gray-800 p-6 rounded-2xl w-80">
      <h2 class="text-xl mb-4">Upload Livery</h2>
      <input id="title" placeholder="Title" class="w-full p-2 mb-3 rounded bg-gray-700">
      <input id="image" placeholder="Image URL" class="w-full p-2 mb-3 rounded bg-gray-700">
      <select id="category" class="w-full p-2 mb-3 rounded bg-gray-700">
        <option>Police</option>
        <option>Fire</option>
        <option>EMS</option>
        <option>Civilian</option>
      </select>
      <button onclick="upload()" class="bg-green-500 w-full py-2 rounded-xl">Upload</button>
    </div>
  </div>

<script>
let user = null;
let liveries = [];
let currentCategory = 'All';

function showRegister() {
  document.getElementById('registerModal').classList.remove('hidden');
}

function showUpload() {
  if (!user) return alert('Register first!');
  document.getElementById('uploadModal').classList.remove('hidden');
}

function register() {
  const username = document.getElementById('username').value;
  const roblox = document.getElementById('roblox').value;
  if (!username || !roblox) return alert('Fill all fields');
  user = { username, roblox };
  alert('Account created!');
  document.getElementById('registerModal').classList.add('hidden');
}

function upload() {
  const title = document.getElementById('title').value;
  const image = document.getElementById('image').value;
  const category = document.getElementById('category').value;

  liveries.push({ title, image, category, author: user.username });
  document.getElementById('uploadModal').classList.add('hidden');
  render();
}

function filterCategory(cat) {
  currentCategory = cat;
  render();
}

function render() {
  const grid = document.getElementById('liveryGrid');
  grid.innerHTML = '';

  liveries
    .filter(l => currentCategory === 'All' || l.category === currentCategory)
    .forEach(l => {
      grid.innerHTML += `
        <div class="bg-gray-800 p-4 rounded-2xl shadow-lg hover:scale-105 transition">
          <img src="${l.image}" class="rounded-xl mb-3">
          <h3 class="text-lg font-bold">${l.title}</h3>
          <p class="text-gray-400">${l.category}</p>
          <p class="text-sm text-gray-500">By ${l.author}</p>
        </div>
      `;
    });
}
</script>

</body>
</html>
